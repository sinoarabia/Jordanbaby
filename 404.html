<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الصفحة غير موجودة | 404 Not Found - Jordan Baby Care</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .error-container { 
            max-width: 600px; 
            margin: 100px auto; 
            text-align: center; 
            padding: 40px; 
            background: white; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            border-top: 5px solid #c98a5c;
        }
        .error-code { font-size: 5rem; color: #b07548; font-weight: bold; margin-bottom: 10px; line-height: 1; }
        .error-icon { font-size: 3rem; margin-bottom: 20px; }
        .error-title { font-size: 1.8rem; color: #2c3e50; margin-bottom: 15px; }
        .error-desc { font-size: 1.1rem; color: #7f8c8d; margin-bottom: 30px; line-height: 1.6; }
        .back-home-btn { 
            display: inline-block; 
            background: #c98a5c; 
            color: white; 
            padding: 12px 35px; 
            font-size: 1.2rem; 
            font-weight: bold; 
            text-decoration: none; 
            border-radius: 30px; 
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(201,138,92,0.3);
        }
        .back-home-btn:hover { background: #b07548; transform: translateY(-3px); }
    </style>
</head>
<body style="background-color: #fcf9f2;">
    <div class="error-container">
        <div class="error-icon">🔍👶</div>
        <div class="error-code">404</div>
        <h1 class="error-title">عذراً، يبدو أنك ضللت الطريق!</h1>
        <p class="error-desc" dir="rtl">الصفحة التي تبحثين عنها غير موجودة أو تم نقلها. لا تقلقي، دعينا نعود إلى الصفحة الرئيسية لاكتشاف المزيد حول رعاية طفلك.<br><br><span style="font-size: 0.9rem;" dir="ltr">Oops! The page you are looking for doesn't exist. Let's get you back home.</span></p>
        <a href="https://jordanbaby.com" class="back-home-btn">العودة إلى الصفحة الرئيسية | Back to Home</a>
    </div>
</body>
</html>
